version: "3.9"

services:

  # ──────────────────────────────────────────────
  #  Base de datos MySQL
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: spacevenue-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # <-- Esto le dice a MySQL que acepte no tener contraseña
    #  MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    #  MYSQL_USER: ${DB_USER}
    #  MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # Usamos la variable acá también para que el healthcheck no falle
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}" ]
   #  interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spacevenue-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Construimos la URL inyectando el nombre de la base de datos desde el .env
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Inyectamos el token secreto
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      PORT: 8080
    ports:
      - "8080:8080"   # expuesto sólo para debug; el front lo accede vía Nginx

  # ──────────────────────────────────────────────
  #  Frontend Nginx
  # ──────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: spacevenue-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  db_data:
