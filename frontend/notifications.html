<!DOCTYPE html>
<html lang="es">
<head>

    <title>Notificaciones | SpaceVenue</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">

</header>

    <div class="flex between align-center" style="margin: 2rem 0;">
