<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceVenue | Encontrá el espacio perfecto</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
    <a href="index.html" class="brand">Space<span>Venue</span></a>
    <nav id="nav-links"></nav>
</header>

<section class="hero">
    <h1>Encontrá el espacio perfecto para tu evento</h1>
    <p>Salones, terrazas, quinchos, estudios y mucho más. Reservá en minutos.</p>
</section>

<!-- Buscador -->
<div class="search-bar">
    <div class="field">
        <label>¿Qué buscás?</label>
        <input type="text" id="f-name" placeholder="Salón, quincho, terraza…">
    </div>
    <div class="field">
        <label>Precio mínimo $</label>
        <input type="number" id="f-min" placeholder="0" min="0">
    </div>
    <div class="field">
        <label>Precio máximo $</label>
        <input type="number" id="f-max" placeholder="Sin límite" min="0">
    </div>
    <button onclick="searchSpaces()">🔍 Buscar</button>
</div>

<div class="container">
    <div class="flex between">
        <h2 class="section-title">Espacios disponibles</h2>
        <button class="btn secondary small" onclick="loadSpaces()">↺ Mostrar todos</button>
    </div>
    <div id="alert"></div>
    <div id="spaces" class="grid"></div>
</div>

<script src="js/api.js"></script>
<script src="js/index.js"></script>
</body>
</html>
