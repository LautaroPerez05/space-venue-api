server {
    listen 80;
    server_name localhost;

    # Sirve los archivos estáticos del frontend
    root /usr/share/nginx/html;
    index index.html;

    # Cualquier ruta que no sea /api se resuelve como archivo estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso: todo lo que empiece con /api va al backend Spring Boot
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Tiempo de espera ampliado (para respuestas de MercadoPago / Google Calendar)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
