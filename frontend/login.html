<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | SpaceVenue</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
    <a href="index.html" class="brand">Space<span>Venue</span></a>
</header>

<div class="form-card">
    <div class="tabs">
        <button id="tab-login"    class="active" onclick="showTab('login')">Iniciar sesión</button>
        <button id="tab-register"              onclick="showTab('register')">Registrarse</button>
    </div>

    <div id="alert"></div>

    <!-- LOGIN -->
    <form id="form-login" autocomplete="on">
        <div class="form-group">
            <label for="login-username">Usuario</label>
            <input id="login-username" type="text" autocomplete="username" required placeholder="Tu nombre de usuario">
        </div>
        <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input id="login-password" type="password" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn" style="width:100%">Ingresar</button>
        <p class="muted" style="margin-top:12px;text-align:center">
            ¿No tenés cuenta? <a href="#" onclick="showTab('register');return false">Registrate gratis</a>
        </p>
    </form>

    <!-- REGISTER -->
    <form id="form-register" class="hidden" autocomplete="on">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px">
            <div class="form-group">
                <label for="reg-firstname">Nombre</label>
                <input id="reg-firstname" type="text" placeholder="Juan">
            </div>
            <div class="form-group">
                <label for="reg-lastname">Apellido</label>
                <input id="reg-lastname" type="text" placeholder="Pérez">
            </div>
        </div>
        <div class="form-group">
            <label for="reg-username">Usuario *</label>
            <input id="reg-username" type="text" autocomplete="username" required placeholder="juanperez99">
        </div>
        <div class="form-group">
            <label for="reg-password">Contraseña *</label>
            <input id="reg-password" type="password" autocomplete="new-password" required placeholder="Mínimo 6 caracteres">
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input id="reg-email" type="email" placeholder="juan@email.com">
        </div>
        <div class="form-group">
            <label for="reg-phone">Teléfono</label>
            <input id="reg-phone" type="text" placeholder="+54 11 1234-5678">
        </div>
        <button type="submit" class="btn success" style="width:100%">Crear cuenta</button>
        <p class="muted" style="margin-top:12px;text-align:center">
            ¿Ya tenés cuenta? <a href="#" onclick="showTab('login');return false">Iniciá sesión</a>
        </p>
    </form>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
