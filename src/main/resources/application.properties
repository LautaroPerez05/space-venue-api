spring.application.name=space-venueaapi

# Busca la variable de entorno llamada MP_ACCESS_TOKEN para el token de Mercado Pago.
mercadopago.access.token=${MP_ACCESS_TOKEN}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# spring.jpa.properties.hibernate.dialect_sql=true este no usarlo en pc de facultad
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Fuerza a Hibernate a usar los nombres de las columnas exactamente como se escriben en @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Asegura que también se respete el mapeo lógico original de las clases
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl