spring.application.name=space-venueaapi

# 1. ?createDatabaseIfNotExist=true le dice a MySQL que cree el esquema si no existe
spring.datasource.url=jdbc:mysql://localhost:3306/space_venue_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=utn12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. CAMBIADO: De 'validate' a 'update' (o 'create') para que genere las tablas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Fuerza a Hibernate a usar los nombres de las columnas exactamente como se escriben en @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Asegura que también se respete el mapeo lógico original de las clases
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl
