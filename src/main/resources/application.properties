spring.application.name=space-venueaapi

server.port=${PORT:8080}

mercadopago.access.token=${MP_ACCESS_TOKEN}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyHbmImpl

# Google OAuth2 Configuration
google.oauth2.client-id=${GOOGLE_OAUTH2_CLIENT_ID:}
google.oauth2.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET:}
google.oauth2.redirect-uri=${GOOGLE_OAUTH2_REDIRECT_URI:http://localhost:8080/api/google-oauth2/callback}
